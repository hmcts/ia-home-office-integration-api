java:
  # Don't modify this file, it is only needed for the pipeline to set the image and ingressHost
  image: ${IMAGE_NAME}
  ingressHost: ${SERVICE_FQDN}
  environment:
    HOME_OFFICE_ENDPOINT: "http://ia-home-office-mock-api-aat.service.core-compute-aat.internal"
    APP_PUBLIC_IP_ENABLED: "true"
    LOGGING_LEVEL_IO_LETTUCE_CORE_PROTOCOL_CONNECTIONWATCHDOG: "WARN" # Suppress the Redis reconnection INFO messages every ten minutes due to no traffic