java:
  image: ${IMAGE_NAME}
  ingressHost: ${SERVICE_FQDN}
  environment:
    HOME_OFFICE_ENDPOINT: "http://ia-home-office-mock-api-{{ .Values.global.environment }}.service.core-compute-{{ .Values.global.environment }}.internal"
    POSTGRES_HOST: "ia-preview.postgres.database.azure.com"
    POSTGRES_NAME: "pr-3076-ia-case-api"
    POSTGRES_USERNAME: hmcts
    POSTGRES_PASSWORD: hmcts
    POSTGRES_CONNECTION_OPTIONS: ""
  keyVaults:
    ia:
      resourceGroup: ia
      secrets:
        - name: postgres-auth-values-password
          alias: PG_AUTH_VALUES_YAML_PASS
  secrets:
    POSTGRES_PASSWORD:
      secretRef: postgres
      key: PASSWORD
      disabled: false

postgresql:
  enabled: true
  flexibleserver: ia-preview
  setup:
    databases:
      - name: "pr-${CHANGE_ID}-ia-case-api"
